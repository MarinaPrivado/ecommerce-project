<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="200" rx="16" fill="#181B59"/>

  <!-- chip frame -->
  <rect x="60" y="35" width="110" height="110" rx="12" fill="none" stroke="#782E9F" stroke-width="3"/>

  <!-- pins left -->
  <line x1="60" y1="55" x2="38" y2="55" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="60" y1="75" x2="38" y2="75" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="60" y1="95" x2="38" y2="95" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="60" y1="115" x2="38" y2="115" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="60" y1="125" x2="38" y2="125" stroke="#E9A0F2" stroke-width="2.5"/>

  <!-- pins right -->
  <line x1="170" y1="55" x2="192" y2="55" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="170" y1="75" x2="192" y2="75" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="170" y1="95" x2="192" y2="95" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="170" y1="115" x2="192" y2="115" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="170" y1="125" x2="192" y2="125" stroke="#E9A0F2" stroke-width="2.5"/>

  <!-- pins top -->
  <line x1="88" y1="35" x2="88" y2="14" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="115" y1="35" x2="115" y2="14" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="142" y1="35" x2="142" y2="14" stroke="#E9A0F2" stroke-width="2.5"/>

  <!-- pins bottom -->
  <line x1="88" y1="145" x2="88" y2="166" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="115" y1="145" x2="115" y2="166" stroke="#E9A0F2" stroke-width="2.5"/>
  <line x1="142" y1="145" x2="142" y2="166" stroke="#E9A0F2" stroke-width="2.5"/>

  <!-- inner core -->
  <rect x="78" y="50" width="74" height="80" rx="6" fill="#782E9F" opacity="0.25"/>
  <rect x="78" y="50" width="74" height="80" rx="6" fill="none" stroke="#782E9F" stroke-width="1.5"/>

  <!-- lightning bolt -->
  <polygon points="122,60 104,88 116,88 108,130 132,96 120,96" fill="#E9A0F2"/>

  <!-- NEX -->
  <text x="215" y="125" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="#BFBFBF" letter-spacing="-2">NEX</text>
  <!-- VOLT -->
  <text x="405" y="125" font-family="Arial, sans-serif" font-weight="700" font-size="72" fill="#782E9F" letter-spacing="-2">VOLT</text>

  <!-- divider -->
  <line x1="210" y1="140" x2="590" y2="140" stroke="#2A3A7B" stroke-width="0.8"/>

  <!-- tagline -->
  <text x="400" y="162" font-family="Arial, sans-serif" font-weight="400" font-size="13" fill="#2A3A7B" letter-spacing="6" text-anchor="middle">ELECTRONICS</text>
</svg>
