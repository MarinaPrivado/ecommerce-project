services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8081:8000"
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      DB_CONNECTION: mysql
      DB_HOST: BD
      DB_PORT: 3306
      DB_DATABASE: ecommerce
      DB_USERNAME: ecommerce_user
      DB_PASSWORD: senha123
    depends_on:
      - BD

  BD:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: senha123
    volumes:
      - ./BD:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: